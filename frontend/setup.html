<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Setup | Pathlynx</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            background: #f4f6f8;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: #1a73e8;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            background: #1557b0;
        }

        button:disabled {
            background: #ccc;
        }

        .success {
            color: green;
            margin-top: 1rem;
            padding: 1rem;
            background: #e8f5e9;
            border-radius: 6px;
            display: none;
        }

        .error {
            color: red;
            margin-top: 1rem;
            padding: 1rem;
            background: #ffebee;
            border-radius: 6px;
            display: none;
        }

        .divider {
            margin: 2rem 0;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🛠️ Initialize Database</h1>
        <p>Use this tool to create your first Admin account and seed the database.</p>

        <div class="input-group">
            <label>Admin Email</label>
            <input type="email" id="email" placeholder="admin@pathlynx.edu" value="admin@pathlynx.edu">
        </div>
        <div class="input-group">
            <label>Password (min 6 chars)</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" value="Master Admin">
        </div>

        <button id="create-btn">Create Admin & Seed DB</button>

        <div id="success-msg" class="success"></div>
        <div id="error-msg" class="error"></div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module">
        // Wait for variables to be attached to window by firebase-config.js
        // But since we are using modules for config above to get the imports, we need to adapt.
        // Actually, mixing module and non-module is tricky. Best is to use the global approach fully.
        // The firebase-config.js is now a module that imports compat libs.

        import './js/firebase-config.js'; // This runs the config file

        document.getElementById('create-btn').addEventListener('click', async () => {
            const btn = document.getElementById('create-btn');
            const successDiv = document.getElementById('success-msg');
            const errorDiv = document.getElementById('error-msg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Setting up...";
            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                // Access globals attached by firebase-config.js
                // Note: imports in firebase-config.js are async. We need to wait or rely on module loading order.
                const auth = window.auth;
                const db = window.db;

                // 1. Create Auth User
                let user;
                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    user = cred.user;
                } catch (e) {
                    if (e.code === 'auth/email-already-in-use') {
                        // Try signing in
                        const cred = await auth.signInWithEmailAndPassword(email, password);
                        user = cred.user;
                        console.log("User already existed, logged in.");
                    } else {
                        throw e;
                    }
                }

                // 2. Create Admin Document
                await db.collection("admins").doc(user.uid).set({
                    fullName: name,
                    email: email,
                    role: "admin",
                    department: "IT Administration",
                    mobileNumber: "",
                    photo: ""
                });

                // 3. Seed Mock Students
                await db.collection("students").doc("dummy_student_1").set({
                    fullName: "Rahul Kumar",
                    enrollmentNo: "0827CS221001",
                    email: "rahul@example.com",
                    department: "Computer Science",
                    year: "3rd Year",
                    cgpa: "8.5",
                    skills: ["JavaScript", "Python", "React", "Node.js"],
                    achievements: "Winner of SIH 2024",
                    photo: ""
                });

                successDiv.textContent = `✅ Success! Admin '${email}' created. You can now log in.`;
                successDiv.style.display = 'block';
                btn.textContent = "Go to Login";
                btn.onclick = () => window.location.href = "admin-login.html";
                btn.disabled = false;

            } catch (err) {
                console.error(err);
                errorDiv.textContent = `Error: ${err.message}`;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = "Try Again";
            }
        });
    </script>
</body>

</html>
