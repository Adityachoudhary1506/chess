<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Pathlynx</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- ✅ FIXED PATH (adjust if needed) -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body admin-mode">

    <div class="app-background"></div>

    <div class="auth-container">
        <div class="auth-card admin-auth-card">

            <!-- Header -->
            <div class="auth-header">
                <div class="auth-logo">
                    <span class="material-icons-round" style="color:#d93025">terminal</span>
                    <span>Path<span class="highlight">lynx</span></span>
                </div>
                <h2>Admin Portal</h2>
                <div class="security-warning">
                    <span class="material-icons-round">lock</span>
                    <span>Authorized Administrators Only</span>
                </div>
            </div>

            <!-- ✅ FORM START -->
            <form id="admin-login-form">

                <div class="input-group">
                    <label>Admin Username / Email</label>
                    <div class="icon-input">
                        <span class="material-icons-round input-icon">badge</span>
                        <input type="text" id="admin-id" placeholder="admin@pathlynx.edu" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="icon-input password-group">
                        <span class="material-icons-round input-icon">vpn_key</span>
                        <input type="password" id="password" placeholder="Enter secure password" required>

                        <button type="button" onclick="togglePassword()">
                            <span class="material-icons-round" id="eye-icon">visibility_off</span>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <a href="#" class="forgot-link" style="margin-left:auto;">Forgot Password?</a>
                </div>

                <!-- ✅ FIXED BUTTON (IMPORTANT) -->
                <button type="submit" class="btn-admin-action">
                    Login
                </button>

                <!-- ✅ FIXED CREATE ADMIN LINK -->
                <div style="text-align:center; margin-top:10px;">
                    <a href="admin-register.html"
                        style="display:inline-block; color:#856404; font-weight:500;">
                        Create Admin Account
                    </a>
                </div>

            </form>
            <!-- ✅ FORM END -->

        </div>

        <!-- Footer -->
        <div class="auth-footer">
            <p>
                Don't have an admin account?
                <a href="admin-register.html">Create one</a>
            </p>
            <p>
                <span class="material-icons-round">help_outline</span>
                Contact IT Support for access issues.
            </p>
        </div>

    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase-config.js"></script>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility_off';
            }
        }
    </script>

</body>
</html>
